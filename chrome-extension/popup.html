<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Guard</title>
    <style>
      :root { color-scheme: dark; }
      body {
        width: 260px;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #000;
        color: #fff;
      }
      .wrap { padding: 16px; }
      .brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em;
        font-size: 13px;
      }
      .badge {
        display: grid; place-items: center; width: 28px; height: 28px;
        border: 2px solid #fff; font-size: 10px; font-weight: 800;
      }
      .row {
        display: flex; align-items: center; justify-content: space-between;
        margin-top: 16px; font-size: 13px;
      }
      .muted { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }
      .status { margin-top: 14px; font-size: 12px; color: #67e8f9; text-transform: uppercase; font-weight: 700; }
      button.link {
        margin-top: 16px; width: 100%;
        border: 2px solid #fff; background: #fff; color: #000;
        font-weight: 800; text-transform: uppercase; font-size: 12px;
        padding: 9px; cursor: pointer;
      }
      button.link:hover { background: transparent; color: #fff; }
      input[type="checkbox"] { width: 16px; height: 16px; accent-color: #67e8f9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand"><span class="badge">AI</span> Focus Guard</div>
      <div class="row">
        <label for="enabled">Watching active tab</label>
        <input type="checkbox" id="enabled" />
      </div>
      <p class="muted" id="count">—</p>
      <p class="status" id="status">You're focused.</p>
      <button class="link" id="options">Edit distracting sites</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
