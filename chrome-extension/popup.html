<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Guard</title>
    <style>
      :root { color-scheme: dark; }
      body {
        width: 288px;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #000;
        color: #fff;
      }
      .wrap { padding: 16px; }
      .brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em;
        font-size: 13px;
      }
      .badge {
        display: grid; place-items: center; width: 28px; height: 28px;
        border: 2px solid #fff; font-size: 10px; font-weight: 800;
      }
      .row {
        display: flex; align-items: center; justify-content: space-between;
        margin-top: 16px; font-size: 13px;
      }
      .muted { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }
      .status { margin-top: 14px; font-size: 12px; color: #67e8f9; text-transform: uppercase; font-weight: 700; }
      hr { border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 16px 0 0; }
      .label {
        text-transform: uppercase; font-weight: 800; font-size: 11px;
        color: #fcd34d; letter-spacing: 0.04em; margin-top: 16px;
      }
      .ai-panel { margin-top: 8px; }
      .ai-panel[hidden] { display: none; }
      .field { margin-top: 12px; }
      .field > span { display: block; font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
      input[type="text"], select {
        width: 100%; box-sizing: border-box; background: #0a0a0a; color: #fff;
        border: 1px solid rgba(255,255,255,0.15); padding: 8px;
        font-family: inherit; font-size: 13px;
      }
      input[type="text"]:focus, select:focus { outline: none; border-color: #67e8f9; }
      button.link, button.ghost {
        margin-top: 12px; width: 100%;
        font-weight: 800; text-transform: uppercase; font-size: 12px;
        padding: 9px; cursor: pointer;
      }
      button.link { border: 2px solid #fff; background: #fff; color: #000; }
      button.link:hover { background: transparent; color: #fff; }
      button.ghost { border: 2px solid #67e8f9; background: transparent; color: #67e8f9; }
      button.ghost:hover { background: #67e8f9; color: #000; }
      button:disabled { opacity: 0.5; cursor: default; }
      .summary {
        margin-top: 12px; font-size: 12px; line-height: 1.5;
        color: rgba(255,255,255,0.85); white-space: pre-wrap;
        border-left: 2px solid #67e8f9; padding: 4px 0 4px 10px;
      }
      .summary[hidden] { display: none; }
      .privacy { color: rgba(255,255,255,0.4); font-size: 11px; line-height: 1.5; margin-top: 12px; }
      input[type="checkbox"] { width: 16px; height: 16px; accent-color: #67e8f9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand"><span class="badge">AI</span> Focus Guard</div>

      <div class="row">
        <label for="enabled">Watching active tab</label>
        <input type="checkbox" id="enabled" />
      </div>
      <p class="muted" id="count">—</p>
      <p class="status" id="status">You're focused.</p>

      <hr />

      <div class="row">
        <label for="aiEnabled">AI features</label>
        <input type="checkbox" id="aiEnabled" />
      </div>
      <p class="muted">Off = no network requests. On = smarter nudges + page summaries.</p>

      <div class="ai-panel" id="aiPanel" hidden>
        <div class="field">
          <label><span>What are you working on?</span>
            <input type="text" id="focusNote" maxlength="140"
                   placeholder="e.g. density column lab" />
          </label>
        </div>

        <div class="field">
          <label><span>Nudge tone</span>
            <select id="tone">
              <option value="gentle">Gentle</option>
              <option value="strict">Strict</option>
              <option value="funny">Funny</option>
            </select>
          </label>
        </div>

        <div class="label">Quick page summary</div>
        <button class="ghost" id="summarize">Summarize this page</button>
        <div class="summary" id="summary" hidden></div>
        <p class="privacy">
          Summarizing sends this one page's visible text to NovaMind's server
          (only when you click). Nothing else ever leaves your browser.
        </p>
      </div>

      <button class="link" id="options">Edit distracting sites</button>
    </div>
    <!-- Public, browser-safe Supabase URL + anon key (for the summarize call). -->
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
